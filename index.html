  }
  button { cursor: pointer; transition: all 0.15s ease; }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  @media print {
    .no-print { display: none !important; }
    .tarjeta-registro { break-inside: avoid; box-shadow: none !important; }

  Lightbulb: makeIcon(<><line x1="9" y1="18" x2="15" y2="18"/><line x1="10" y1="22" x2="14" y2="22"/><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/></>),
  Home: makeIcon(<><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>),
  Building: makeIcon(<><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></>),

const ICON_LIBRARY = {
  cable: Icons.Cable, wrench: Icons.Wrench, settings: Icons.Settings, wifi: Icons.Wifi, help: Icons.HelpCircle,

  router: Icons.Router, shield: Icons.Shield, tv: Icons.Tv, camera: Icons.Camera, lightbulb: Icons.Lightbulb,

  { name: 'Verde', color: '#0d7a3d', bg: '#e8f5ee' },
  { name: 'Naranja', color: '#b54708', bg: '#fef3e8' },

  { name: 'Morado', color: '#6d28d9', bg: '#f0eafd' },

  { name: 'Cyan', color: '#0891b2', bg: '#e0f2fe' },

];

function esEmoji(icon) {
  if (!icon) return false;
  if (ICON_LIBRARY[icon]) return false;
  return /[^\x00-\x7F]/.test(icon);
}

function IconoCat({ icon, size = 22 }) {
  if (esEmoji(icon)) {
    return <span style={{ fontSize: size, lineHeight: 1, display: 'inline-block' }}>{icon}</span>;
  }
  const LucideIcon = ICON_LIBRARY[icon] || Icons.HelpCircle;
  return <LucideIcon size={size} />;
}

const CATEGORIAS_DEFAULT = [
  { id: 'instalacion', label: 'Instalación nueva', icon: 'cable', color: '#0d7a3d', bg: '#e8f5ee' },
  { id: 'soporte', label: 'Soporte técnico', icon: 'wrench', color: '#b54708', bg: '#fef3e8' },
  { id: 'mantenimiento', label: 'Mantenimiento', icon: 'settings', color: '#1d4ed8', bg: '#e8eefe' },
  { id: 'configuracion', label: 'Configuración de red', icon: 'wifi', color: '#6d28d9', bg: '#f0eafd' },
  { id: 'otro', label: 'Otro', icon: 'help', color: '#475569', bg: '#eef2f6' },
];

const USUARIOS = {
  admin: { password: 'admin123', rol: 'administrador', nombre: 'Administrador' },
  tecnico: { password: 'tecnico123', rol: 'tecnico', nombre: 'Técnico' },
};

const STORAGE = {
  getRegistros: () => { try { return JSON.parse(localStorage.getItem('registros_v2') || '[]'); } catch { return []; } },
  setRegistros: (r) => localStorage.setItem('registros_v2', JSON.stringify(r)),
  getCategorias: () => { try { const c = localStorage.getItem('categorias_v2'); return c ? JSON.parse(c) : CATEGORIAS_DEFAULT; } catch { return CATEGORIAS_DEFAULT; } },
  setCategorias: (c) => localStorage.setItem('categorias_v2', JSON.stringify(c)),
  getCamposExtra: () => { try { return JSON.parse(localStorage.getItem('campos_extra_v2') || '[]'); } catch { return []; } },
  setCamposExtra: (c) => localStorage.setItem('campos_extra_v2', JSON.stringify(c)),
};

function App() {
  const [usuario, setUsuario] = useState(null);
  const [registros, setRegistros] = useState([]);
  const [categorias, setCategorias] = useState(CATEGORIAS_DEFAULT);
  const [camposExtra, setCamposExtra] = useState([]);
  const [vista, setVista] = useState('registros');
  const [mostrarFormulario, setMostrarFormulario] = useState(false);
  const [editandoRegistro, setEditandoRegistro] = useState(null);
  const [fechaSeleccionada, setFechaSeleccionada] = useState(new Date().toISOString().split('T')[0]);
  const [busqueda, setBusqueda] = useState('');
  const [cargado, setCargado] = useState(false);

  useEffect(() => {
    setRegistros(STORAGE.getRegistros());
    setCategorias(STORAGE.getCategorias());
    setCamposExtra(STORAGE.getCamposExtra());
    setCargado(true);
  }, []);

  useEffect(() => { if (cargado) STORAGE.setRegistros(registros); }, [registros, cargado]);
  useEffect(() => { if (cargado) STORAGE.setCategorias(categorias); }, [categorias, cargado]);
  useEffect(() => { if (cargado) STORAGE.setCamposExtra(camposExtra); }, [camposExtra, cargado]);

  const registrosFiltrados = useMemo(() => {
    let r = registros.filter(x => x.fecha === fechaSeleccionada);
    if (busqueda.trim()) {
      const q = busqueda.toLowerCase().trim();
      r = r.filter(x =>
        x.nombre?.toLowerCase().includes(q) ||
        x.documento?.toLowerCase().includes(q) ||
        x.telefono?.includes(q) ||
        x.telefono2?.includes(q) ||
        x.contexto?.toLowerCase().includes(q)
      );
    }
    return r;
  }, [registros, fechaSeleccionada, busqueda]);

  const busquedaGlobal = useMemo(() => {
    if (!busqueda.trim()) return null;
    const q = busqueda.toLowerCase().trim();
    return registros.filter(x =>
      x.nombre?.toLowerCase().includes(q) ||
      x.documento?.toLowerCase().includes(q) ||
      x.telefono?.includes(q) ||
      x.telefono2?.includes(q)
    );
  }, [registros, busqueda]);

  if (!usuario) return <Login onLogin={setUsuario} />;

  const handleAgregar = (registro) => {
    if (editandoRegistro) {
      setRegistros(registros.map(r => r.id === editandoRegistro.id ? { ...registro, id: r.id, completado: r.completado, creadoPor: r.creadoPor } : r));
      setEditandoRegistro(null);
    } else {
      setRegistros([...registros, { ...registro, id: Date.now(), completado: false, creadoPor: usuario.nombre }]);
    }
    setMostrarFormulario(false);
  };

  const handleToggleCompletado = (id) => {
    if (usuario.rol !== 'administrador') return;
    setRegistros(registros.map(r => r.id === id ? { ...r, completado: !r.completado } : r));
  };

  const handleEliminar = (id) => {
    if (usuario.rol !== 'administrador') return;
    if (!confirm('¿Eliminar este registro?')) return;
    setRegistros(registros.filter(r => r.id !== id));
  };

  const handleEditar = (registro) => { setEditandoRegistro(registro); setMostrarFormulario(true); };

  const handleImprimirPDF = () => {
    const lista = fechaSeleccionada ? registrosFiltrados : (busquedaGlobal || []);
    generarPDF(lista, fechaSeleccionada, categorias, camposExtra);
  };

  const handleLogout = () => { setUsuario(null); setMostrarFormulario(false); setEditandoRegistro(null); };

  return (
    <div style={styles.app}>
      <header style={styles.header} className="no-print">
        <div style={styles.headerLeft}>
          <div style={styles.logo}>
            <div style={styles.logoMark}>S</div>
            <div>
              <div style={styles.logoTitle}>Servicios</div>
              <div style={styles.logoSubtitle}>Registro de Atenciones</div>
            </div>
          </div>
        </div>
        <div style={styles.headerRight}>
          <div style={styles.userInfo}>
            <div style={styles.userBadge}>{usuario.rol === 'administrador' ? 'ADMIN' : 'TÉCNICO'}</div>
            <span style={styles.userName}>{usuario.nombre}</span>
          </div>
          <button onClick={handleLogout} style={styles.iconBtn} title="Cerrar sesión">
            <Icons.LogOut size={18} />
          </button>
        </div>
      </header>

      {usuario.rol === 'administrador' && (
        <nav style={styles.tabs} className="no-print">
          <button onClick={() => setVista('registros')} style={{ ...styles.tab, ...(vista === 'registros' ? styles.tabActivo : {}) }}>
            <Icons.FileText size={15} /> Registros
          </button>
          <button onClick={() => setVista('categorias')} style={{ ...styles.tab, ...(vista === 'categorias' ? styles.tabActivo : {}) }}>
            <Icons.Tag size={15} /> Categorías
          </button>
          <button onClick={() => setVista('campos')} style={{ ...styles.tab, ...(vista === 'campos' ? styles.tabActivo : {}) }}>
            <Icons.Edit2 size={15} /> Campos extra
          </button>
        </nav>
      )}

      <main style={styles.main}>
        {vista === 'registros' && (
          <>
            <section style={styles.toolbar} className="no-print">
              <div style={styles.toolbarLeft}>
                <div style={styles.dateSelector}>
                  <Icons.Calendar size={18} color="#64748b" />
                  <input type="date" value={fechaSeleccionada}
                    onChange={(e) => setFechaSeleccionada(e.target.value)} style={styles.dateInput} />
                </div>
                <div style={styles.searchBox}>
                  <Icons.Search size={16} color="#94a3b8" />
                  <input type="text" placeholder="Buscar por nombre, DNI, teléfono..."
                    value={busqueda} onChange={(e) => setBusqueda(e.target.value)} style={styles.searchInput} />
                  {busqueda && <button onClick={() => setBusqueda('')} style={styles.clearBtn}><Icons.X size={14} /></button>}
                </div>
              </div>
              <div style={styles.toolbarActions}>
                <button onClick={handleImprimirPDF} style={styles.btnSecondary}>
                  <Icons.Printer size={16} /><span>Generar PDF</span>
                </button>
                <button onClick={() => { setEditandoRegistro(null); setMostrarFormulario(true); }} style={styles.btnPrimary}>
                  <Icons.Plus size={16} /><span>Nuevo registro</span>
                </button>
              </div>
            </section>

            {busqueda.trim() && busquedaGlobal && busquedaGlobal.length > registrosFiltrados.length && fechaSeleccionada && (
              <div style={styles.busquedaGlobal} className="no-print">
                <Icons.Search size={14} />
                <span>Hay <strong>{busquedaGlobal.length - registrosFiltrados.length}</strong> resultado(s) en otras fechas que coinciden con "<strong>{busqueda}</strong>".</span>
                <button onClick={() => setFechaSeleccionada('')} style={styles.linkBtn2}>Ver todas las fechas</button>
              </div>
            )}

            <ListaRegistros
              registros={fechaSeleccionada ? registrosFiltrados : (busquedaGlobal || [])}
              categorias={categorias} camposExtra={camposExtra} usuario={usuario}
              onToggle={handleToggleCompletado} onEliminar={handleEliminar} onEditar={handleEditar}
              mostrarFecha={!fechaSeleccionada}
            />
          </>
        )}

        {vista === 'categorias' && <GestorCategorias categorias={categorias} setCategorias={setCategorias} registros={registros} />}
        {vista === 'campos' && <GestorCamposExtra campos={camposExtra} setCampos={setCamposExtra} />}
      </main>

      {mostrarFormulario && (
        <FormularioModal
          fechaInicial={fechaSeleccionada || new Date().toISOString().split('T')[0]}
          categorias={categorias} camposExtra={camposExtra} registroEditando={editandoRegistro}
          onGuardar={handleAgregar}

}

function Login({ onLogin }) {
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [error, setError] = useState('');

  const intentarLogin = () => {
    const u = USUARIOS[user.toLowerCase()];
    if (u && u.password === pass) { onLogin({ usuario: user, rol: u.rol, nombre: u.nombre }); setError(''); }
    else setError('Usuario o contraseña incorrectos');
  };

  return (
    <div style={styles.loginWrapper}>
      <div style={styles.loginCard}>
        <div style={styles.loginLogo}>
          <div style={{ ...styles.logoMark, width: 56, height: 56, fontSize: 24 }}>S</div>
        </div>
        <h1 style={styles.loginTitle}>Sistema de Registros</h1>
        <p style={styles.loginSubtitle}>Ingresa tus credenciales para continuar</p>
        <div style={styles.loginForm}>
          <div style={styles.field}>
            <label style={styles.label}>Usuario</label>
            <input type="text" value={user} onChange={(e) => setUser(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && intentarLogin()}
              style={styles.input} placeholder="admin o tecnico" autoFocus />
          </div>
          <div style={styles.field}>
            <label style={styles.label}>Contraseña</label>
            <input type="password" value={pass} onChange={(e) => setPass(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && intentarLogin()}
              style={styles.input} placeholder="••••••••" />
          </div>
          {error && <div style={styles.errorBox}>{error}</div>}
          <button onClick={intentarLogin} style={styles.btnLogin}>
            <Icons.Lock size={16} /><span>Ingresar</span>
          </button>
        </div>
        <div style={styles.loginHint}>
          <strong>Demo:</strong> admin/admin123 · tecnico/tecnico123
        </div>
      </div>
    </div>
  );
}

function GestorCategorias({ categorias, setCategorias, registros }) {
  const [editando, setEditando] = useState(null);
  const [creando, setCreando] = useState(false);

  const guardar = (cat) => {
    if (editando) {
      setCategorias(categorias.map(c => c.id === editando.id ? { ...cat, id: editando.id } : c));
    } else {
      const nuevoId = cat.label.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
      setCategorias([...categorias, { ...cat, id: nuevoId }]);
    }
    setEditando(null); setCreando(false);
  };

  const eliminar = (id) => {
    const enUso = registros.some(r => r.tipo === id);
    if (enUso) { alert('No se puede eliminar: hay registros usando esta categoría.'); return; }
    if (categorias.length <= 1) { alert('Debe quedar al menos una categoría.'); return; }
    if (!confirm('¿Eliminar esta categoría?')) return;
    setCategorias(categorias.filter(c => c.id !== id));
  };

  return (
    <div>
      <div style={styles.sectionHeader}>
        <div>
          <h2 style={styles.sectionTitle}>Categorías de servicio</h2>
          <p style={styles.sectionSub}>Personalizá los tipos de servicio que ofrecés.</p>
        </div>
        <button onClick={() => { setCreando(true); setEditando(null); }} style={styles.btnPrimary}>
          <Icons.Plus size={16} /> Nueva categoría
        </button>
      </div>
      <div style={styles.catGrid}>
        {categorias.map(cat => {
          const enUso = registros.filter(r => r.tipo === cat.id).length;
          return (
            <div key={cat.id} style={{ ...styles.catCard, borderLeftColor: cat.color }}>
              <div style={{ ...styles.iconoTipo, backgroundColor: cat.bg, color: cat.color }}>
                <IconoCat icon={cat.icon} size={24} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={styles.catLabel}>{cat.label}</div>
                <div style={styles.catUso}>{enUso} {enUso === 1 ? 'registro' : 'registros'}</div>
              </div>
              <div style={{ display: 'flex', gap: 4 }}>
                <button onClick={() => { setEditando(cat); setCreando(false); }} style={styles.deleteBtn} title="Editar">
                  <Icons.Edit2 size={15} />
                </button>
                <button onClick={() => eliminar(cat.id)} style={styles.deleteBtn} title="Eliminar">
                  <Icons.Trash2 size={15} />
                </button>
              </div>
            </div>
          );
        })}
      </div>
      {(editando || creando) && (
        <CategoriaEditor categoria={editando} onGuardar={guardar}
          onCerrar={() => { setEditando(null); setCreando(false); }} />
      )}
    </div>
  );
}

function GestorCamposExtra({ campos, setCampos }) {

    if (editando) {
      setCampos(campos.map(c => c.id === editando.id ? { ...campo, id: editando.id } : c));
    } else {
      setCampos([...campos, { ...campo, id: 'campo_' + Date.now() }]);

  const eliminar = (id) => {
    if (!confirm('¿Eliminar este campo? Los datos guardados se conservarán pero no se mostrarán.')) return;

  return (
    <div>

                <div style={styles.catLabel}>{c.label}</div>

function generarPDF(registros, fecha, categorias, camposExtra) {
  if (!registros || registros.length === 0) { alert('No hay registros para imprimir.'); return; }

  const fechaLegible = fecha ? new Date(fecha + 'T00:00:00').toLocaleDateString('es-PE', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }) : 'Todas las fechas';
  const fechaTitulo = fechaLegible.charAt(0).toUpperCase() + fechaLegible.slice(1);
  const completados = registros.filter(r => r.completado).length;
  const pendientes = registros.length - completados;

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));

  const tarjetasHTML = registros.map((r, i) => {
    const cat = categorias.find(c => c.id === r.tipo) || { label: 'Sin categoría', color: '#475569', bg: '#eef2f6', icon: 'help' };
    const camposActivos = camposExtra.filter(c => r.extras?.[c.id]);
    const iconoHTML = esEmoji(cat.icon)
      ? `<span style="font-size: 18px;">${esc(cat.icon)}</span>`
      : `<span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${cat.color};margin-right:4px;"></span>`;

    return `
      <article class="registro" style="border-left-color: ${cat.color};">
        <div class="reg-header">
          <div class="reg-num">${i + 1}.</div>
          <div class="reg-title">
            <div class="reg-cliente">${esc(r.nombre)}</div>
            <div class="reg-cat" style="color: ${cat.color};">
              ${iconoHTML} ${esc(cat.label).toUpperCase()}
            </div>
          </div>
          <div class="reg-estado ${r.completado ? 'completado' : 'pendiente'}">
            ${r.completado ? '✓ COMPLETADO' : '○ PENDIENTE'}
          </div>
        </div>
        <div class="reg-datos">
          <div><strong>DNI/RUC:</strong> ${esc(r.documento) || '—'}</div>
          <div><strong>Teléfono:</strong> ${esc(r.telefono) || '—'}${r.telefono2 ? ' / ' + esc(r.telefono2) : ''}</div>
          <div><strong>Atendido por:</strong> ${esc(r.creadoPor) || '—'}</div>
          ${camposActivos.map(c => `<div><strong>${esc(c.label)}:</strong> ${esc(r.extras[c.id])}</div>`).join('')}
        </div>
        ${r.contexto ? `<div class="reg-contexto"><strong>Detalle:</strong> ${esc(r.contexto)}</div>` : ''}
      </article>
    `;
  }).join('');

  const html = `<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><title>Servicios - ${esc(fecha || 'todos')}</title>
<style>
  @page { size: A4; margin: 15mm; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji", sans-serif; color: #0f172a; margin: 0; padding: 20px; font-size: 11pt; line-height: 1.4; }
  .doc-header { border-bottom: 2px solid #0f172a; padding-bottom: 10px; margin-bottom: 16px; }
  .doc-title { font-size: 18pt; font-weight: 700; margin: 0 0 4px; }
  .doc-fecha { font-size: 10pt; color: #475569; text-transform: capitalize; }
  .doc-stats { font-size: 9pt; color: #64748b; margin-bottom: 16px; }
  .registro { border: 1px solid #e2e8f0; border-left: 4px solid; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; page-break-inside: avoid; break-inside: avoid; }
  .reg-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .reg-num { font-weight: 700; font-size: 11pt; color: #475569; }
  .reg-title { flex: 1; }
  .reg-cliente { font-size: 12pt; font-weight: 600; margin-bottom: 2px; }
  .reg-cat { font-size: 8.5pt; font-weight: 700; letter-spacing: 0.04em; }
  .reg-estado { font-size: 8pt; font-weight: 700; letter-spacing: 0.05em; padding: 3px 8px; border-radius: 12px; white-space: nowrap; }
  .reg-estado.completado { background: #e8f5ee; color: #0d7a3d; }
  .reg-estado.pendiente { background: #fef3e8; color: #b54708; }
  .reg-datos { font-size: 9.5pt; color: #334155; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; margin-bottom: 6px; }
  .reg-datos strong { color: #64748b; font-weight: 500; }
  .reg-contexto { font-size: 9.5pt; color: #334155; padding-top: 6px; border-top: 1px dashed #e2e8f0; margin-top: 4px; }
  .reg-contexto strong { color: #64748b; }
  .doc-footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #e2e8f0; font-size: 8pt; color: #94a3b8; text-align: center; }
  .acciones { position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; z-index: 1000; }
  .acciones button { padding: 10px 18px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .acciones .primary { background: #0f172a; color: white; border-color: #0f172a; }
  @media print { .acciones { display: none; } body { padding: 0; } }
</style></head>
<body>
  <div class="acciones">
    <button onclick="window.close()">Cerrar</button>
    <button class="primary" onclick="window.print()">Imprimir / Guardar PDF</button>
  </div>
  <div class="doc-header">
    <h1 class="doc-title">Registro de Servicios Técnicos</h1>
    <div class="doc-fecha">${esc(fechaTitulo)}</div>
  </div>
  <div class="doc-stats">
    Total: <strong>${registros.length}</strong>  ·
    Completados: <strong>${completados}</strong>  ·
    Pendientes: <strong>${pendientes}</strong>
  </div>
  ${tarjetasHTML}
  <div class="doc-footer">Generado el ${new Date().toLocaleString('es-PE')}</div>
  <script>window.addEventListener('load', () => setTimeout(() => window.print(), 300));<\/script>
</body></html>`;

  const ventana = window.open('', '_blank', 'width=900,height=1000');
  if (!ventana) { alert('Tu navegador bloqueó la ventana emergente. Habilitalas para este sitio.'); return; }
  ventana.document.write(html);
  ventana.document.close();
}
