<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Servicios Técnicos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf9;color:#0f172a;min-height:100vh}
button{cursor:pointer;font-family:inherit;transition:all .15s}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(0)}
input,textarea,select{font-family:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:2px solid #0f172a;outline-offset:1px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at 20% 20%,rgba(15,23,42,.04),transparent 40%),radial-gradient(circle at 80% 80%,rgba(13,122,61,.04),transparent 40%)}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(15,23,42,.06);border:1px solid #e2e8f0}
.login-logo{display:flex;justify-content:center;margin-bottom:20px}
.logo-mark{width:56px;height:56px;border-radius:14px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;letter-spacing:-.02em}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.login-sub{font-size:14px;color:#64748b;text-align:center;margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;font-weight:500;color:#334155}
.input{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#fff;width:100%}
.error-box{padding:10px 12px;background:#fef2f2;color:#991b1b;border-radius:8px;font-size:13px;border:1px solid #fecaca}
.btn-login{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;background:#0f172a;color:#fff;border:none;font-size:14px;font-weight:600;margin-top:4px;width:100%}
.login-hint{margin-top:24px;padding:12px;background:#f8fafc;border-radius:8px;font-size:12px;color:#64748b;text-align:center}

/* HEADER */
.app-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-mark-sm{width:36px;height:36px;border-radius:9px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.logo-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
.logo-sub{font-size:11px;color:#64748b}
.header-right{display:flex;align-items:center;gap:12px}
.user-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#f1f5f9;color:#475569;letter-spacing:.04em;text-transform:uppercase}
.user-name{font-size:14px;font-weight:500;color:#334155}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;color:#64748b}
.icon-btn:hover{background:#f8fafc}

/* NAV TABS */
.nav-tabs{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;gap:4px}
.tab{padding:10px 16px;border:none;background:transparent;font-size:13px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;border-radius:0;display:flex;align-items:center;gap:6px}
.tab:hover{color:#0f172a;transform:none}
.tab.active{color:#0f172a;border-bottom-color:#0f172a;font-weight:600}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:24px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.toolbar-left{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.date-selector{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px}
.date-selector input{border:none;background:transparent;font-size:14px;color:#0f172a;outline:none}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;flex:1;min-width:220px}
.search-box input{border:none;background:transparent;font-size:14px;color:#0f172a;outline:none;flex:1}
.clear-btn{border:none;background:transparent;color:#94a3b8;display:flex;align-items:center;padding:0}
.toolbar-actions{display:flex;gap:8px}
.btn-primary{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;background:#0f172a;color:#fff;border:none;font-size:14px;font-weight:600}
.btn-secondary{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;background:#fff;color:#334155;border:1px solid #e2e8f0;font-size:14px;font-weight:500}
.btn-secondary:hover{background:#f8fafc}

/* AVISO GLOBAL */
.global-notice{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:13px;margin-bottom:16px;color:#1e40af}
.link-btn{background:transparent;border:none;color:#1d4ed8;font-size:13px;font-weight:500;padding:0;text-decoration:underline}

/* LISTA */
.lista-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lista-count{font-size:14px;color:#64748b}
.lista-stats{display:flex;gap:16px;font-size:13px}
.stat-ok{color:#0d7a3d;font-weight:500}
.stat-pend{color:#b54708;font-weight:500}
.tarjetas{display:flex;flex-direction:column;gap:12px}

/* TARJETA */
.tarjeta{background:#fff;border:1px solid #e2e8f0;border-left:4px solid;border-radius:12px;padding:20px 24px;box-shadow:0 1px 2px rgba(0,0,0,.04);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tarjeta.completada{opacity:.7}
.tarjeta-header{display:flex;align-items:flex-start;gap:16px}
.icono-tipo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.tarjeta-info{flex:1;min-width:0}
.tarjeta-cliente{font-size:17px;font-weight:600;color:#0f172a;letter-spacing:-.01em;margin-bottom:2px}
.tarjeta-tipo{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tarjeta-fecha-inline{text-transform:none;color:#94a3b8;font-weight:400}
.tarjeta-actions{display:flex;align-items:center;gap:8px}
.check-btn{border:none;background:transparent;padding:4px;border-radius:6px;display:flex;font-size:22px;line-height:1}
.estado-badge{font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.del-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:16px}
.del-btn:hover{color:#ef4444;background:#fef2f2;transform:none}
.tarjeta-body{margin-top:16px;margin-left:60px}
.datos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:8px}
.dato{display:flex;align-items:flex-start;gap:8px}
.dato-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.dato-valor{font-size:14px;color:#0f172a;font-weight:500;margin-top:2px}
.detalle-box{margin-top:12px;padding-top:12px;border-top:1px dashed #e2e8f0}
.detalle-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:4px}
.detalle-texto{font-size:14px;color:#334155;line-height:1.5}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;background:#fff;border-radius:12px;border:1px dashed #cbd5e1}
.empty-icon{width:64px;height:64px;border-radius:16px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.empty-title{font-size:18px;font-weight:600;margin-bottom:6px;color:#334155}
.empty-text{font-size:14px;color:#64748b}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:18px;font-weight:600;letter-spacing:-.01em}
.modal-body{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tipo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.tipo-opcion{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:10px;border:2px solid;background:#fff;font-size:12px;font-weight:500;text-align:center;line-height:1.2}
.tipo-opcion:hover{transform:translateY(-1px)}
.extras-box{background:#f8fafc;border-radius:10px;padding:16px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:12px}
.extras-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
.link-add{border:none;background:transparent;color:#1d4ed8;font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px;padding:0}

/* SECTION */
.section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.section-sub{font-size:14px;color:#64748b;margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.cat-card{display:flex;align-items:center;gap:14px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;border-left:4px solid;padding:14px 16px}
.cat-label{font-size:14px;font-weight:600;color:#0f172a}
.cat-uso{font-size:12px;color:#94a3b8;margin-top:2px}
.campo-lista{display:flex;flex-direction:column;gap:8px}
.campo-card{display:flex;align-items:center;gap:12px;background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px}

/* COLORS */
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-btn{width:32px;height:32px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .15s}
.color-btn.active{transform:scale(1.15)}

/* EMOJI GRID */
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:4px;max-height:180px;overflow-y:auto;padding:8px;background:#f8fafc;border-radius:8px}
.emoji-btn{width:100%;aspect-ratio:1;border-radius:6px;border:2px solid transparent;font-size:18px;display:flex;align-items:center;justify-content:center;background:#fff;cursor:pointer}
.emoji-btn.active{border-color:#0f172a;background:#f1f5f9}
.toggle-row{display:inline-flex;background:#f1f5f9;border-radius:8px;padding:3px;gap:2px;margin-bottom:8px}
.toggle-btn{border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;background:transparent;color:#64748b}
.toggle-btn.active{background:#fff;color:#0f172a;box-shadow:0 1px 3px rgba(0,0,0,.1)}

@media print{
  .no-print{display:none!important}
  .tarjeta{break-inside:avoid;box-shadow:none!important}
}
@media(max-width:600px){
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-actions{justify-content:flex-end}
  .row-2{grid-template-columns:1fr}
  .main{padding:16px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ─── DATOS BASE ────────────────────────────────────────────────────────────
const USUARIOS = {
  admin:   { password: 'admin123',   rol: 'administrador', nombre: 'Administrador' },
  tecnico: { password: 'tecnico123', rol: 'tecnico',        nombre: 'Técnico' },
};

const CATEGORIAS_DEFAULT = [
  { id: 'instalacion',   label: 'Instalación nueva',    icon: '🔌', color: '#0d7a3d', bg: '#e8f5ee' },
  { id: 'soporte',       label: 'Soporte técnico',      icon: '🔧', color: '#b54708', bg: '#fef3e8' },
  { id: 'mantenimiento', label: 'Mantenimiento',         icon: '⚙️', color: '#1d4ed8', bg: '#e8eefe' },
  { id: 'configuracion', label: 'Configuración de red',  icon: '📡', color: '#6d28d9', bg: '#f0eafd' },
  { id: 'otro',          label: 'Otro',                  icon: '📋', color: '#475569', bg: '#eef2f6' },
];

const COLORES = [
  { name:'Verde',     color:'#0d7a3d', bg:'#e8f5ee' },
  { name:'Naranja',   color:'#b54708', bg:'#fef3e8' },
  { name:'Azul',      color:'#1d4ed8', bg:'#e8eefe' },
  { name:'Morado',    color:'#6d28d9', bg:'#f0eafd' },
  { name:'Rojo',      color:'#b91c1c', bg:'#fee2e2' },
  { name:'Cyan',      color:'#0891b2', bg:'#e0f2fe' },
  { name:'Rosa',      color:'#be185d', bg:'#fce7f3' },
  { name:'Ámbar',     color:'#a16207', bg:'#fef9c3' },
  { name:'Esmeralda', color:'#047857', bg:'#d1fae5' },
  { name:'Gris',      color:'#475569', bg:'#eef2f6' },
];

const EMOJIS = [
  '🔧','🔨','🪛','⚙️','🛠️','🧰','🔩','⚡','🔌','💡',
  '📡','📶','📱','☎️','📺','💻','🖥️','⌨️','🖨️','💾',
  '📷','🔊','🌐','☁️','🔒','🔑','📦','🏠','🏢','📋',
  '📝','✅','⚠️','🎯','🚀','💎','🔥','⭐','🛡️','🔐',
];

// ─── STORAGE ──────────────────────────────────────────────────────────────
const S = {
  get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ─── ESTADO GLOBAL ────────────────────────────────────────────────────────
let state = {
  usuario: null,
  registros: S.get('reg_v3', []),
  categorias: S.get('cat_v3', CATEGORIAS_DEFAULT),
  camposExtra: S.get('campos_v3', []),
  vista: 'registros',
  fechaSel: new Date().toISOString().split('T')[0],
  busqueda: '',
  modal: null, // { tipo: 'registro'|'categoria'|'campo', datos: {} }
  editando: null,
};

function setState(patch) {
  Object.assign(state, patch);
  if (patch.registros !== undefined)  S.set('reg_v3',    state.registros);
  if (patch.categorias !== undefined) S.set('cat_v3',    state.categorias);
  if (patch.camposExtra !== undefined) S.set('campos_v3', state.camposExtra);
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const escHTML = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getCat(id) {
  return state.categorias.find(c => c.id === id) || state.categorias[state.categorias.length - 1] || CATEGORIAS_DEFAULT[4];
}

function hoy() { return new Date().toISOString().split('T')[0]; }

// ─── RENDER PRINCIPAL ─────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.usuario) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderApp();
  bindApp();
}

// ─── LOGIN ─────────────────────────────────────────────────────────────────
function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo"><div class="logo-mark">S</div></div>
      <h1 class="login-title">Sistema de Registros</h1>
      <p class="login-sub">Ingresa tus credenciales para continuar</p>
      <div class="login-form">
        <div class="field">
          <label>Usuario</label>
          <input id="l-user" class="input" placeholder="admin o tecnico" autofocus />
        </div>
        <div class="field">
          <label>Contraseña</label>
          <input id="l-pass" class="input" type="password" placeholder="••••••••" />
        </div>
        <div id="l-error" style="display:none" class="error-box"></div>
        <button id="l-btn" class="btn-login">🔒 Ingresar</button>
      </div>
      <div class="login-hint"><strong>Demo:</strong> admin / admin123 &nbsp;·&nbsp; tecnico / tecnico123</div>
    </div>
  </div>`;
}

function bindLogin() {
  const doLogin = () => {
    const u = $('l-user').value.trim().toLowerCase();
    const p = $('l-pass').value;
    const usr = USUARIOS[u];
    if (usr && usr.password === p) {
      setState({ usuario: { usuario: u, ...usr } });
    } else {
      $('l-error').textContent = 'Usuario o contraseña incorrectos';
      $('l-error').style.display = 'block';
    }
  };
  $('l-btn').onclick = doLogin;
  ['l-user','l-pass'].forEach(id => $(id).addEventListener('keydown', e => e.key === 'Enter' && doLogin()));
  setTimeout(() => $('l-user') && $('l-user').focus(), 50);
}

// ─── APP SHELL ─────────────────────────────────────────────────────────────
function renderApp() {
  const u = state.usuario;
  const esAdmin = u.rol === 'administrador';

  const tabs = esAdmin ? `
  <nav class="nav-tabs no-print">
    <button class="tab ${state.vista==='registros'?'active':''}" data-tab="registros">📄 Registros</button>
    <button class="tab ${state.vista==='categorias'?'active':''}" data-tab="categorias">🏷️ Categorías</button>
    <button class="tab ${state.vista==='campos'?'active':''}" data-tab="campos">✏️ Campos extra</button>
  </nav>` : '';

  let contenido = '';
  if (state.vista === 'registros') contenido = renderRegistros();
  else if (state.vista === 'categorias') contenido = renderCategorias();
  else if (state.vista === 'campos') contenido = renderCampos();

  const modal = state.modal ? renderModal() : '';

  return `
  <header class="app-header no-print">
    <div class="header-logo">
      <div class="logo-mark-sm">S</div>
      <div>
        <div class="logo-title">Servicios</div>
        <div class="logo-sub">Registro de Atenciones</div>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge">${escHTML(u.rol)}</span>
      <span class="user-name">${escHTML(u.nombre)}</span>
      <button class="icon-btn" id="btn-logout" title="Cerrar sesión">🚪</button>
    </div>
  </header>
  ${tabs}
  <main class="main">${contenido}</main>
  ${modal}`;
}

// ─── REGISTROS ─────────────────────────────────────────────────────────────
function getRegistrosFiltrados() {
  let r = state.registros;
  if (state.fechaSel) r = r.filter(x => x.fecha === state.fechaSel);
  const q = state.busqueda.trim().toLowerCase();
  if (q) r = r.filter(x =>
    (x.nombre||'').toLowerCase().includes(q) ||
    (x.documento||'').toLowerCase().includes(q) ||
    (x.telefono||'').includes(q) ||
    (x.telefono2||'').includes(q) ||
    (x.contexto||'').toLowerCase().includes(q)
  );
  return r;
}

function getBusquedaGlobal() {
  const q = state.busqueda.trim().toLowerCase();
  if (!q) return null;
  return state.registros.filter(x =>
    (x.nombre||'').toLowerCase().includes(q) ||
    (x.documento||'').toLowerCase().includes(q) ||
    (x.telefono||'').includes(q) ||
    (x.telefono2||'').includes(q)
  );
}

function renderRegistros() {
  const filtrados = getRegistrosFiltrados();
  const global    = getBusquedaGlobal();
  const lista     = state.fechaSel ? filtrados : (global || []);

  const avisoGlobal = (state.busqueda.trim() && global && state.fechaSel &&
    global.length > filtrados.length) ? `
    <div class="global-notice no-print">
      🔍 Hay <strong>${global.length - filtrados.length}</strong> resultado(s) en otras fechas con "<strong>${escHTML(state.busqueda)}</strong>".
      <button class="link-btn" id="btn-ver-todas">Ver todas las fechas</button>
    </div>` : '';

  return `
  <div class="toolbar no-print">
    <div class="toolbar-left">
      <div class="date-selector">
        📅 <input type="date" id="fecha-sel" value="${state.fechaSel}" />
      </div>
      <div class="search-box">
        🔍 <input id="busqueda" type="text" placeholder="Buscar por nombre, DNI, teléfono..." value="${escHTML(state.busqueda)}" />
        ${state.busqueda ? '<button class="clear-btn" id="btn-clear">✕</button>' : ''}
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="btn-secondary no-print" id="btn-print">🖨️ <span>Generar PDF</span></button>
      <button class="btn-primary no-print" id="btn-nuevo">+ <span>Nuevo registro</span></button>
    </div>
  </div>
  ${avisoGlobal}
  ${renderLista(lista)}`;
}

function renderLista(lista) {
  if (!lista.length) return `
  <div class="empty">
    <div class="empty-icon">📄</div>
    <h3 class="empty-title">Sin registros</h3>
    <p class="empty-text">No hay atenciones que mostrar para este día.</p>
  </div>`;

  const completados = lista.filter(r => r.completado).length;
  const tarjetas    = lista.map(r => renderTarjeta(r)).join('');

  return `
  <div class="lista-header">
    <span class="lista-count">${lista.length} ${lista.length===1?'registro':'registros'}</span>
    <div class="lista-stats">
      <span class="stat-ok">✓ ${completados} completados</span>
      <span class="stat-pend">○ ${lista.length - completados} pendientes</span>
    </div>
  </div>
  <div class="tarjetas">${tarjetas}</div>`;
}

function renderTarjeta(r) {
  const cat     = getCat(r.tipo);
  const esAdmin = state.usuario.rol === 'administrador';
  const opac    = r.completado ? 'completada' : '';

  const checkBtn = esAdmin
    ? `<button class="check-btn" data-id="${r.id}" data-action="toggle" title="Marcar completado" style="color:${r.completado?'#0d7a3d':'#94a3b8'}">${r.completado?'✅':'⭕'}</button>`
    : `<span class="estado-badge" style="background:${r.completado?'#e8f5ee':'#fef3e8'};color:${r.completado?'#0d7a3d':'#b54708'}">${r.completado?'Completado':'Pendiente'}</span>`;

  const adminBtns = esAdmin ? `
    <button class="del-btn" data-id="${r.id}" data-action="edit" title="Editar">✏️</button>
    <button class="del-btn" data-id="${r.id}" data-action="del" title="Eliminar">✕</button>` : '';

  const mostrarFecha = !state.fechaSel;
  const fechaTag = mostrarFecha && r.fecha ? `<span class="tarjeta-fecha-inline"> · ${r.fecha}</span>` : '';

  const extras = (state.camposExtra || []).map(c =>
    r.extras?.[c.id] ? renderDato('🏷️', c.label, r.extras[c.id]) : ''
  ).join('');

  const detalle = r.contexto ? `
  <div class="detalle-box">
    <div class="detalle-label">Detalle</div>
    <div class="detalle-texto">${escHTML(r.contexto)}</div>
  </div>` : '';

  return `
  <article class="tarjeta ${opac}" style="border-left-color:${cat.color}">
    <div class="tarjeta-header">
      <div class="icono-tipo" style="background:${cat.bg};color:${cat.color}">${cat.icon}</div>
      <div class="tarjeta-info">
        <div class="tarjeta-cliente">${escHTML(r.nombre)}</div>
        <div class="tarjeta-tipo" style="color:${cat.color}">${escHTML(cat.label)}${fechaTag}</div>
      </div>
      <div class="tarjeta-actions no-print">
        ${checkBtn}${adminBtns}
      </div>
    </div>
    <div class="tarjeta-body">
      <div class="datos-grid">
        ${renderDato('#️','DNI / RUC', r.documento)}
        ${renderDato('📞','Teléfono', r.telefono)}
        ${r.telefono2 ? renderDato('📞','Teléfono alt.', r.telefono2) : ''}
        ${renderDato('👤','Atendido por', r.creadoPor)}
        ${extras}
      </div>
      ${detalle}
    </div>
  </article>`;
}

function renderDato(icon, label, valor) {
  if (!valor) return '';
  return `
  <div class="dato">
    <span style="font-size:14px;color:#94a3b8">${icon}</span>
    <div>
      <div class="dato-label">${escHTML(label)}</div>
      <div class="dato-valor">${escHTML(valor)}</div>
    </div>
  </div>`;
}

// ─── CATEGORÍAS ────────────────────────────────────────────────────────────
function renderCategorias() {
  const cats = state.categorias.map(cat => {
    const uso = state.registros.filter(r => r.tipo === cat.id).length;
    return `
    <div class="cat-card" style="border-left-color:${cat.color}">
      <div class="icono-tipo" style="background:${cat.bg};color:${cat.color};font-size:22px">${cat.icon}</div>
      <div style="flex:1">
        <div class="cat-label">${escHTML(cat.label)}</div>
        <div class="cat-uso">${uso} ${uso===1?'registro':'registros'}</div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="del-btn" data-id="${cat.id}" data-action="edit-cat" title="Editar">✏️</button>
        <button class="del-btn" data-id="${cat.id}" data-action="del-cat" title="Eliminar">🗑️</button>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="section-header">
    <div>
      <h2 class="section-title">Categorías de servicio</h2>
      <p class="section-sub">Personalizá los tipos de servicio.</p>
    </div>
    <button class="btn-primary" id="btn-nueva-cat">+ Nueva categoría</button>
  </div>
  <div class="cat-grid">${cats}</div>`;
}

// ─── CAMPOS EXTRA ──────────────────────────────────────────────────────────
function renderCampos() {
  const campos = state.camposExtra.map((c,i) => `
  <div class="campo-card">
    <div style="flex:1">
      <div style="font-size:14px;font-weight:600;color:#0f172a">${escHTML(c.label)}</div>
      <div style="font-size:12px;color:#94a3b8;margin-top:2px">${c.tipo||'texto'} · placeholder: ${escHTML(c.placeholder||'-')}</div>
    </div>
    <button class="del-btn" data-idx="${i}" data-action="del-campo" title="Eliminar">✕</button>
  </div>`).join('');

  return `
  <div class="section-header">
    <div>
      <h2 class="section-title">Campos adicionales</h2>
      <p class="section-sub">Campos extra que aparecen en el formulario de registro.</p>
    </div>
    <button class="btn-primary" id="btn-nuevo-campo">+ Nuevo campo</button>
  </div>
  <div class="campo-lista">${campos || '<p style="color:#64748b;font-size:14px">No hay campos extra configurados.</p>'}</div>`;
}

// ─── MODALES ───────────────────────────────────────────────────────────────
function renderModal() {
  const m = state.modal;
  let body = '';

  if (m.tipo === 'registro') body = renderModalRegistro(m.datos);
  else if (m.tipo === 'categoria') body = renderModalCategoria(m.datos);
  else if (m.tipo === 'campo') body = renderModalCampo(m.datos);

  return `<div class="modal-overlay" id="modal-overlay">${body}</div>`;
}

function renderModalRegistro(d) {
  const fecha = d?.fecha || state.fechaSel || hoy();
  const tipos = state.categorias.map(t => {
    const activo = (d?.tipo || state.categorias[0]?.id) === t.id;
    return `<button class="tipo-opcion" data-tipo="${t.id}"
      style="border-color:${activo?t.color:'#e2e8f0'};background:${activo?t.bg:'#fff'};color:${activo?t.color:'#475569'}">
      <span style="font-size:18px">${t.icon}</span>
      <span>${escHTML(t.label)}</span>
    </button>`;
  }).join('');

  const extras = state.camposExtra.length ? `
  <div class="extras-box">
    <div class="extras-title">Campos adicionales</div>
    ${state.camposExtra.map(c => `
    <div class="field">
      <label>${escHTML(c.label)}</label>
      <input class="input" id="extra-${c.id}" type="${c.tipo||'text'}" value="${escHTML(d?.extras?.[c.id]||'')}" placeholder="${escHTML(c.placeholder||'')}" />
    </div>`).join('')}
  </div>` : '';

  return `
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">${d?.id ? 'Editar registro' : 'Nuevo registro'}</h2>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nombre y apellido del cliente *</label>
        <input id="f-nombre" class="input" value="${escHTML(d?.nombre||'')}" placeholder="Ej. Juan Pérez García" />
      </div>
      <div class="row-2">
        <div class="field">
          <label>Fecha *</label>
          <input id="f-fecha" class="input" type="date" value="${fecha}" />
        </div>
        <div class="field">
          <label>DNI o RUC *</label>
          <input id="f-doc" class="input" value="${escHTML(d?.documento||'')}" placeholder="12345678" />
        </div>
      </div>
      <div class="field">
        <label>Número de celular *</label>
        <input id="f-tel" class="input" type="tel" value="${escHTML(d?.telefono||'')}" placeholder="999 888 777" />
      </div>
      <div id="tel2-wrap">
        ${d?.telefono2
          ? `<div class="field"><label>Número alternativo</label><input id="f-tel2" class="input" type="tel" value="${escHTML(d.telefono2)}" placeholder="999 888 777" /></div>`
          : `<button class="link-add" id="btn-add-tel2">+ Agregar otro número</button>`}
      </div>
      <div class="field">
        <label>Tipo de servicio *</label>
        <div class="tipo-grid" id="tipo-grid">${tipos}</div>
      </div>
      ${extras}
      <div class="field">
        <label>Contexto / detalle del trabajo</label>
        <textarea id="f-contexto" class="input" style="min-height:90px;resize:vertical" placeholder="Describí lo que se hará, equipos, observaciones...">${escHTML(d?.contexto||'')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">${d?.id ? 'Actualizar' : 'Guardar registro'}</button>
    </div>
  </div>`;
}

function renderModalCategoria(d) {
  const col = d?.color || COLORES[0].color;
  const bg  = d?.bg    || COLORES[0].bg;
  const ico = d?.icon  || '🔧';

  const colores = COLORES.map(c => `
  <button class="color-btn ${c.color===col?'active':''}" data-color="${c.color}" data-bg="${c.bg}"
    style="background:${c.color};${c.color===col?`box-shadow:0 0 0 3px ${c.color}55`:''}"></button>`
  ).join('');

  const emojis = EMOJIS.map(e => `
  <button class="emoji-btn ${e===ico?'active':''}" data-emoji="${e}">${e}</button>`).join('');

  return `
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">${d?.id ? 'Editar categoría' : 'Nueva categoría'}</h2>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="cat-preview" class="cat-card" style="border-left-color:${col};margin-bottom:4px">
        <div class="icono-tipo" id="cat-prev-ico" style="background:${bg};color:${col};font-size:22px">${ico}</div>
        <div>
          <div class="cat-label" id="cat-prev-label">${escHTML(d?.label||'Vista previa')}</div>
          <div class="cat-uso">Vista previa</div>
        </div>
      </div>
      <div class="field">
        <label>Nombre *</label>
        <input id="cat-label" class="input" value="${escHTML(d?.label||'')}" placeholder="Ej. Cambio de equipo" />
      </div>
      <div class="field">
        <label>Color</label>
        <div class="color-row">${colores}</div>
      </div>
      <div class="field">
        <label>Ícono (emoji)</label>
        <div class="emoji-grid">${emojis}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">Guardar</button>
    </div>
  </div>`;
}

function renderModalCampo(d) {
  return `
  <div class="modal" onclick="event.stopPropagation()" style="max-width:420px">
    <div class="modal-header">
      <h2 class="modal-title">Nuevo campo extra</h2>
      <button class="icon-btn" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nombre del campo *</label>
        <input id="campo-label" class="input" value="${escHTML(d?.label||'')}" placeholder="Ej. Número de serie" />
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="campo-tipo" class="input">
          <option value="text" ${d?.tipo==='text'?'selected':''}>Texto</option>
          <option value="number" ${d?.tipo==='number'?'selected':''}>Número</option>
          <option value="date" ${d?.tipo==='date'?'selected':''}>Fecha</option>
        </select>
      </div>
      <div class="field">
        <label>Placeholder (opcional)</label>
        <input id="campo-ph" class="input" value="${escHTML(d?.placeholder||'')}" placeholder="Texto de ayuda..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">Agregar campo</button>
    </div>
  </div>`;
}

// ─── BIND APP ──────────────────────────────────────────────────────────────
function bindApp() {
  // Logout
  $('btn-logout')?.addEventListener('click', () => setState({ usuario: null }));

  // Tabs
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => setState({ vista: t.dataset.tab }))
  );

  // Registros
  if (state.vista === 'registros') {
    $('fecha-sel')?.addEventListener('change', e => setState({ fechaSel: e.target.value }));
    $('busqueda')?.addEventListener('input', e => setState({ busqueda: e.target.value }));
    $('btn-clear')?.addEventListener('click', () => setState({ busqueda: '' }));
    $('btn-ver-todas')?.addEventListener('click', () => setState({ fechaSel: '' }));
    $('btn-nuevo')?.addEventListener('click', () => abrirModalRegistro(null));
    $('btn-print')?.addEventListener('click', () => window.print());

    document.querySelectorAll('[data-action]').forEach(btn => {
      const { action, id, idx } = btn.dataset;
      if (action === 'toggle') btn.onclick = () => toggleCompletado(id);
      if (action === 'del')    btn.onclick = () => eliminarRegistro(id);
      if (action === 'edit')   btn.onclick = () => abrirModalRegistro(state.registros.find(r=>r.id==id));
    });
  }

  // Categorías
  if (state.vista === 'categorias') {
    $('btn-nueva-cat')?.addEventListener('click', () => abrirModalCategoria(null));
    document.querySelectorAll('[data-action="edit-cat"]').forEach(b =>
      b.addEventListener('click', () => abrirModalCategoria(state.categorias.find(c=>c.id===b.dataset.id)))
    );
    document.querySelectorAll('[data-action="del-cat"]').forEach(b =>
      b.addEventListener('click', () => eliminarCategoria(b.dataset.id))
    );
  }

  // Campos
  if (state.vista === 'campos') {
    $('btn-nuevo-campo')?.addEventListener('click', () => abrirModalCampo());
    document.querySelectorAll('[data-action="del-campo"]').forEach(b =>
      b.addEventListener('click', () => {
        const campos = [...state.camposExtra];
        campos.splice(+b.dataset.idx, 1);
        setState({ camposExtra: campos });
      })
    );
  }

  // Modal
  bindModal();
}

function bindModal() {
  if (!state.modal) return;
  const overlay = $('modal-overlay');
  overlay?.addEventListener('click', cerrarModal);
  $('modal-close')?.addEventListener('click', cerrarModal);
  $('modal-cancel')?.addEventListener('click', cerrarModal);

  const m = state.modal;

  if (m.tipo === 'registro') {
    // Tel2
    $('btn-add-tel2')?.addEventListener('click', () => {
      $('tel2-wrap').innerHTML = `<div class="field"><label>Número alternativo</label><input id="f-tel2" class="input" type="tel" placeholder="999 888 777" /></div>`;
    });
    // Tipo selector
    document.querySelectorAll('#tipo-grid .tipo-opcion').forEach(btn => {
      btn.addEventListener('click', () => {
        const tid = btn.dataset.tipo;
        const cat = getCat(tid);
        document.querySelectorAll('#tipo-grid .tipo-opcion').forEach(b => {
          const bc = getCat(b.dataset.tipo);
          b.style.borderColor = b.dataset.tipo===tid ? bc.color : '#e2e8f0';
          b.style.background  = b.dataset.tipo===tid ? bc.bg    : '#fff';
          b.style.color       = b.dataset.tipo===tid ? bc.color : '#475569';
        });
      });
    });
    // Save
    $('modal-save')?.addEventListener('click', guardarRegistro);
  }

  if (m.tipo === 'categoria') {
    // Live preview label
    $('cat-label')?.addEventListener('input', e => {
      $('cat-prev-label').textContent = e.target.value || 'Vista previa';
    });
    // Color
    document.querySelectorAll('.color-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(x => {
          x.classList.remove('active');
          x.style.boxShadow = '';
        });
        b.classList.add('active');
        b.style.boxShadow = `0 0 0 3px ${b.dataset.color}55`;
        // update preview
        $('cat-prev-ico').style.background = b.dataset.bg;
        $('cat-prev-ico').style.color      = b.dataset.color;
        $('cat-preview').style.borderLeftColor = b.dataset.color;
      });
    });
    // Emoji
    document.querySelectorAll('.emoji-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        $('cat-prev-ico').textContent = b.dataset.emoji;
      });
    });
    $('modal-save')?.addEventListener('click', guardarCategoria);
  }

  if (m.tipo === 'campo') {
    $('modal-save')?.addEventListener('click', guardarCampo);
  }
}

// ─── ACCIONES ──────────────────────────────────────────────────────────────
function cerrarModal() { setState({ modal: null, editando: null }); }

function abrirModalRegistro(datos) {
  setState({ modal: { tipo: 'registro', datos: datos || null }, editando: datos });
  setTimeout(() => $('f-nombre') && $('f-nombre').focus(), 50);
}

function abrirModalCategoria(datos) {
  setState({ modal: { tipo: 'categoria', datos: datos || null } });
  setTimeout(() => $('cat-label') && $('cat-label').focus(), 50);
}

function abrirModalCampo() {
  setState({ modal: { tipo: 'campo', datos: null } });
}

function guardarRegistro() {
  const nombre   = $('f-nombre')?.value.trim();
  const fecha    = $('f-fecha')?.value;
  const documento= $('f-doc')?.value.trim();
  const telefono = $('f-tel')?.value.trim();
  if (!nombre || !fecha || !documento || !telefono) {
    alert('Completá los campos obligatorios (*)'); return;
  }
  const tipoActivo = document.querySelector('#tipo-grid .tipo-opcion[style*="border-color"]') ||
                     document.querySelector('#tipo-grid .tipo-opcion');
  const tipo = tipoActivo?.dataset.tipo || state.categorias[0]?.id || 'otro';

  const extras = {};
  state.camposExtra.forEach(c => {
    const el = $(`extra-${c.id}`);
    if (el) extras[c.id] = el.value;
  });

  const reg = {
    nombre, fecha, documento, telefono,
    telefono2: $('f-tel2')?.value.trim() || '',
    tipo,
    contexto: $('f-contexto')?.value.trim() || '',
    extras,
  };

  let registros;
  if (state.editando?.id) {
    registros = state.registros.map(r =>
      r.id === state.editando.id
        ? { ...r, ...reg }
        : r
    );
  } else {
    registros = [...state.registros, {
      ...reg,
      id: Date.now(),
      completado: false,
      creadoPor: state.usuario.nombre,
    }];
  }
  setState({ registros, modal: null, editando: null });
}

function toggleCompletado(id) {
  if (state.usuario.rol !== 'administrador') return;
  const registros = state.registros.map(r =>
    String(r.id) === String(id) ? { ...r, completado: !r.completado } : r
  );
  setState({ registros });
}

function eliminarRegistro(id) {
  if (state.usuario.rol !== 'administrador') return;
  if (!confirm('¿Eliminar este registro?')) return;
  setState({ registros: state.registros.filter(r => String(r.id) !== String(id)) });
}

function guardarCategoria() {
  const label = $('cat-label')?.value.trim();
  if (!label) { alert('Ingresá un nombre'); return; }

  const colorActivo = document.querySelector('.color-btn.active');
  const emojiActivo = document.querySelector('.emoji-btn.active');

  const color = colorActivo?.dataset.color || COLORES[0].color;
  const bg    = colorActivo?.dataset.bg    || COLORES[0].bg;
  const icon  = emojiActivo?.dataset.emoji || '🔧';

  const editando = state.modal.datos;
  let categorias;
  if (editando?.id) {
    categorias = state.categorias.map(c =>
      c.id === editando.id ? { ...c, label, color, bg, icon } : c
    );
  } else {
    const id = label.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now();
    categorias = [...state.categorias, { id, label, color, bg, icon }];
  }
  setState({ categorias, modal: null });
}

function eliminarCategoria(id) {
  const enUso = state.registros.some(r => r.tipo === id);
  if (enUso) { alert('No se puede eliminar: hay registros usando esta categoría.'); return; }
  if (state.categorias.length <= 1) { alert('Debe quedar al menos una categoría.'); return; }
  if (!confirm('¿Eliminar esta categoría?')) return;
  setState({ categorias: state.categorias.filter(c => c.id !== id) });
}

function guardarCampo() {
  const label = $('campo-label')?.value.trim();
  if (!label) { alert('Ingresá un nombre para el campo'); return; }
  const id = label.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now();
  const campo = {
    id,
    label,
    tipo: $('campo-tipo')?.value || 'text',
    placeholder: $('campo-ph')?.value.trim() || '',
  };
  setState({ camposExtra: [...state.camposExtra, campo], modal: null });
}

// ─── INIT ──────────────────────────────────────────────────────────────────
render();
</script>

</html>
