<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Servicios Técnicos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafaf9;color:#0f172a;min-height:100vh}
button{cursor:pointer;font-family:inherit;transition:all .15s}
button:hover{transform:translateY(-1px)}
button:active{transform:translateY(0)}
input,textarea,select{font-family:inherit;font-size:14px}
input:focus,textarea:focus,select:focus{outline:2px solid #0f172a;outline-offset:1px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(15,23,42,.06);border:1px solid #e2e8f0}
.login-logo{display:flex;justify-content:center;margin-bottom:20px}
.logo-mark{width:56px;height:56px;border-radius:14px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700}
.login-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.login-sub{font-size:14px;color:#64748b;text-align:center;margin-bottom:28px}
.login-form{display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;font-weight:500;color:#334155}
.input{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#0f172a;background:#fff;width:100%}
.error-box{padding:10px 12px;background:#fef2f2;color:#991b1b;border-radius:8px;font-size:13px;border:1px solid #fecaca}
.btn-login{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;background:#0f172a;color:#fff;border:none;font-size:14px;font-weight:600;margin-top:4px;width:100%}
.app-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-mark-sm{width:36px;height:36px;border-radius:9px;background:#0f172a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.logo-title{font-size:15px;font-weight:700}
.logo-sub{font-size:11px;color:#64748b}
.header-right{display:flex;align-items:center;gap:12px}
.user-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:#f1f5f9;color:#475569;text-transform:uppercase;letter-spacing:.04em}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:flex;align-items:center;justify-content:center;color:#64748b}
.nav-tabs{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;display:flex;gap:4px}
.tab{padding:10px 16px;border:none;background:transparent;font-size:13px;font-weight:500;color:#64748b;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
.tab:hover{color:#0f172a;transform:none}
.tab.active{color:#0f172a;border-bottom-color:#0f172a;font-weight:600}
.main{max-width:900px;margin:0 auto;padding:24px}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.toolbar-left{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.date-selector{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px}
.date-selector input{border:none;background:transparent;font-size:14px;color:#0f172a;outline:none}
.search-box{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;flex:1;min-width:220px}
.search-box input{border:none;background:transparent;font-size:14px;outline:none;flex:1}
.toolbar-actions{display:flex;gap:8px}
.btn-primary{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;background:#0f172a;color:#fff;border:none;font-size:14px;font-weight:600}
.btn-secondary{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;background:#fff;color:#334155;border:1px solid #e2e8f0;font-size:14px;font-weight:500}
.lista-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.lista-count{font-size:14px;color:#64748b}
.lista-stats{display:flex;gap:16px;font-size:13px}
.stat-ok{color:#0d7a3d;font-weight:500}
.stat-pend{color:#b54708;font-weight:500}
.tarjetas{display:flex;flex-direction:column;gap:12px}
.tarjeta{background:#fff;border:1px solid #e2e8f0;border-left:4px solid;border-radius:12px;padding:20px 24px;box-shadow:0 1px 2px rgba(0,0,0,.04);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tarjeta.completada{opacity:.7}
.tarjeta-header{display:flex;align-items:flex-start;gap:16px}
.icono-tipo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.tarjeta-info{flex:1;min-width:0}
.tarjeta-cliente{font-size:17px;font-weight:600;color:#0f172a;margin-bottom:2px}
.tarjeta-tipo{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tarjeta-actions{display:flex;align-items:center;gap:8px}
.check-btn{border:none;background:transparent;padding:4px;border-radius:6px;font-size:22px;line-height:1}
.estado-badge{font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.del-btn{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:16px}
.del-btn:hover{color:#ef4444;background:#fef2f2;transform:none}
.tarjeta-body{margin-top:16px;margin-left:60px}
.datos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:8px}
.dato{display:flex;align-items:flex-start;gap:8px}
.dato-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.dato-valor{font-size:14px;color:#0f172a;font-weight:500;margin-top:2px}
.detalle-box{margin-top:12px;padding-top:12px;border-top:1px dashed #e2e8f0}
.detalle-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-bottom:4px}
.detalle-texto{font-size:14px;color:#334155;line-height:1.5}
.empty{text-align:center;padding:80px 20px;background:#fff;border-radius:12px;border:1px dashed #cbd5e1}
.empty-icon{width:64px;height:64px;border-radius:16px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.empty-title{font-size:18px;font-weight:600;margin-bottom:6px;color:#334155}
.empty-text{font-size:14px;color:#64748b}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.modal-title{font-size:18px;font-weight:600}
.modal-body{padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:16px 24px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:10px}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tipo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.tipo-opcion{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:12px;font-weight:500;text-align:center;color:#475569}
.tipo-opcion.activo{border-color:var(--cat-color);background:var(--cat-bg);color:var(--cat-color)}
.extras-box{background:#f8fafc;border-radius:10px;padding:16px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:12px}
.section-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.section-title{font-size:22px;font-weight:700;letter-spacing:-.02em}
.section-sub{font-size:14px;color:#64748b;margin-top:4px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.cat-card{display:flex;align-items:center;gap:14px;background:#fff;border-radius:12px;border:1px solid #e2e8f0;border-left:4px solid;padding:14px 16px}
.cat-label{font-size:14px;font-weight:600;color:#0f172a}
.cat-uso{font-size:12px;color:#94a3b8;margin-top:2px}
.campo-lista{display:flex;flex-direction:column;gap:8px}
.campo-card{display:flex;align-items:center;gap:12px;background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-btn{width:32px;height:32px;border-radius:8px;border:2px solid transparent;cursor:pointer}
.color-btn.active{transform:scale(1.15)}
.emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:4px;max-height:180px;overflow-y:auto;padding:8px;background:#f8fafc;border-radius:8px}
.emoji-btn{width:100%;aspect-ratio:1;border-radius:6px;border:2px solid transparent;font-size:18px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-btn.active{border-color:#0f172a;background:#f1f5f9}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e2e8f0;border-top-color:#0f172a;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#0f172a;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:999;animation:fadeIn .3s ease}
.toast.error{background:#b91c1c}
@media print{.no-print{display:none!important}.tarjeta{break-inside:avoid;box-shadow:none!important}}
@media(max-width:600px){.toolbar{flex-direction:column;align-items:stretch}.row-2{grid-template-columns:1fr}.main{padding:16px}}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh"><div class="spinner"></div></div></div>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const API = 'api.php';

const COLORES = [
  {name:'Verde',     color:'#0d7a3d',bg:'#e8f5ee'},
  {name:'Naranja',   color:'#b54708',bg:'#fef3e8'},
  {name:'Azul',      color:'#1d4ed8',bg:'#e8eefe'},
  {name:'Morado',    color:'#6d28d9',bg:'#f0eafd'},
  {name:'Rojo',      color:'#b91c1c',bg:'#fee2e2'},
  {name:'Cyan',      color:'#0891b2',bg:'#e0f2fe'},
  {name:'Rosa',      color:'#be185d',bg:'#fce7f3'},
  {name:'Ámbar',     color:'#a16207',bg:'#fef9c3'},
  {name:'Esmeralda', color:'#047857',bg:'#d1fae5'},
  {name:'Gris',      color:'#475569',bg:'#eef2f6'},
];
const EMOJIS = ['🔧','🔨','🪛','⚙️','🛠️','🧰','🔩','⚡','🔌','💡','📡','📶','📱','☎️','📺','💻','🖥️','⌨️','🖨️','💾','📷','🔊','🌐','☁️','🔒','🔑','📦','🏠','🏢','📋','📝','✅','⚠️','🎯','🚀','💎','🔥','⭐','🛡️','🔐'];

// ─── ESTADO ────────────────────────────────────────────────────────────────
let S = {
  usuario:    null,
  registros:  [],
  categorias: [],
  campos:     [],
  vista:      'registros',
  fecha:      new Date().toISOString().split('T')[0],
  busqueda:   '',
  modal:      null,
  editando:   null,
  loading:    false,
};

// ─── API CALLS ─────────────────────────────────────────────────────────────
async function api(action, params = {}, method = 'GET') {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    let url = `${API}?action=${action}`;
    if (method === 'GET') {
      Object.entries(params).forEach(([k,v]) => url += `&${k}=${encodeURIComponent(v)}`);
    } else {
      opts.body = JSON.stringify({ action, ...params });
    }
    const res  = await fetch(url, opts);
    const json = await res.json();
    if (!json.ok) throw new Error(json.msg || 'Error del servidor');
    return json.data;
  } catch (e) {
    toast(e.message, true);
    throw e;
  }
}

// ─── HELPERS ───────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function getCat(id) {
  return S.categorias.find(c => c.id === id) || S.categorias[S.categorias.length-1] || {icon:'📋',color:'#475569',bg:'#eef2f6',label:'Sin categoría'};
}

function toast(msg, error = false) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const el = document.createElement('div');
  el.className = 'toast' + (error ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setState(patch) { Object.assign(S, patch); render(); }

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const u = await api('me');
    S.usuario = u;
    await cargarTodo();
    render();
  } catch {
    S.usuario = null;
    render();
  }
}

async function cargarTodo() {
  const [cats, campos] = await Promise.all([
    api('get_categorias'),
    api('get_campos'),
  ]);
  S.categorias = cats || [];
  S.campos     = campos || [];
  await cargarRegistros();
}

async function cargarRegistros() {
  const rows = await api('get_registros', { fecha: S.fecha, busqueda: S.busqueda });
  S.registros = rows || [];
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!S.usuario) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderShell();
  bindShell();
}

// LOGIN
function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo"><div class="logo-mark">S</div></div>
      <h1 class="login-title">Sistema de Registros</h1>
      <p class="login-sub">Ingresa tus credenciales para continuar</p>
      <div class="login-form">
        <div class="field"><label>Usuario</label><input id="l-user" class="input" placeholder="admin o tecnico" /></div>
        <div class="field"><label>Contraseña</label><input id="l-pass" class="input" type="password" placeholder="••••••••" /></div>
        <div id="l-err" style="display:none" class="error-box"></div>
        <button id="l-btn" class="btn-login">🔒 Ingresar</button>
      </div>
    </div>
  </div>`;
}

function bindLogin() {
  const doLogin = async () => {
    const usuario  = $('l-user').value.trim();
    const password = $('l-pass').value;
    if (!usuario || !password) return;
    try {
      const u = await api('login', { usuario, password }, 'POST');
      S.usuario = u;
      await cargarTodo();
      render();
    } catch(e) {
      $('l-err').textContent = e.message;
      $('l-err').style.display = 'block';
    }
  };
  $('l-btn').onclick = doLogin;
  ['l-user','l-pass'].forEach(id => $(id)?.addEventListener('keydown', e => e.key==='Enter' && doLogin()));
  setTimeout(() => $('l-user')?.focus(), 50);
}

// SHELL
function renderShell() {
  const esAdmin = S.usuario.rol === 'administrador';
  const tabs = esAdmin ? `
  <nav class="nav-tabs no-print">
    <button class="tab ${S.vista==='registros'?'active':''}" data-tab="registros">📄 Registros</button>
    <button class="tab ${S.vista==='categorias'?'active':''}" data-tab="categorias">🏷️ Categorías</button>
    <button class="tab ${S.vista==='campos'?'active':''}" data-tab="campos">✏️ Campos extra</button>
  </nav>` : '';

  let contenido = '';
  if (S.vista === 'registros') contenido = renderRegistros();
  else if (S.vista === 'categorias') contenido = renderCategorias();
  else if (S.vista === 'campos') contenido = renderCampos();

  const modal = S.modal ? renderModal() : '';

  return `
  <header class="app-header no-print">
    <div class="header-logo">
      <div class="logo-mark-sm">S</div>
      <div><div class="logo-title">Servicios</div><div class="logo-sub">Registro de Atenciones</div></div>
    </div>
    <div class="header-right">
      <span class="user-badge">${esc(S.usuario.rol)}</span>
      <span style="font-size:14px;font-weight:500;color:#334155">${esc(S.usuario.nombre)}</span>
      <button class="icon-btn" id="btn-logout" title="Cerrar sesión">🚪</button>
    </div>
  </header>
  ${tabs}
  <main class="main">${contenido}</main>
  ${modal}`;
}

function bindShell() {
  $('btn-logout')?.addEventListener('click', async () => {
    await api('logout', {}, 'POST');
    S.usuario = null; S.registros = []; render();
  });
  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', async () => {
      S.vista = t.dataset.tab; render();
    })
  );
  if (S.vista === 'registros') bindRegistros();
  if (S.vista === 'categorias') bindCategorias();
  if (S.vista === 'campos') bindCampos();
  if (S.modal) bindModal();
}

// REGISTROS
function renderRegistros() {
  const lista = S.registros;
  const completados = lista.filter(r => r.completado).length;

  const tarjetas = lista.length === 0
    ? `<div class="empty"><div class="empty-icon">📄</div><h3 class="empty-title">Sin registros</h3><p class="empty-text">No hay atenciones que mostrar para este día.</p></div>`
    : `
    <div class="lista-header">
      <span class="lista-count">${lista.length} ${lista.length===1?'registro':'registros'}</span>
      <div class="lista-stats"><span class="stat-ok">✓ ${completados} completados</span><span class="stat-pend">○ ${lista.length-completados} pendientes</span></div>
    </div>
    <div class="tarjetas">${lista.map(renderTarjeta).join('')}</div>`;

  return `
  <div class="toolbar no-print">
    <div class="toolbar-left">
      <div class="date-selector">📅 <input type="date" id="fecha-sel" value="${S.fecha}" /></div>
      <div class="search-box">🔍 <input id="busqueda" type="text" placeholder="Buscar por nombre, DNI, teléfono..." value="${esc(S.busqueda)}" /></div>
    </div>
    <div class="toolbar-actions">
      <button class="btn-secondary no-print" id="btn-print">🖨️ PDF</button>
      <button class="btn-primary no-print" id="btn-nuevo">+ Nuevo registro</button>
    </div>
  </div>
  ${tarjetas}`;
}

function bindRegistros() {
  $('fecha-sel')?.addEventListener('change', async e => {
    S.fecha = e.target.value;
    await cargarRegistros(); render();
  });

  let busqTimer;
  $('busqueda')?.addEventListener('input', e => {
    S.busqueda = e.target.value;
    clearTimeout(busqTimer);
    busqTimer = setTimeout(async () => { await cargarRegistros(); render(); }, 400);
  });

  $('btn-print')?.addEventListener('click', () => window.print());
  $('btn-nuevo')?.addEventListener('click', () => { S.modal = {tipo:'registro',datos:null}; S.editando=null; render(); setTimeout(()=>$('f-nombre')?.focus(),50); });

  document.querySelectorAll('[data-action]').forEach(btn => {
    const {action, id} = btn.dataset;
    if (action === 'toggle') btn.onclick = () => accionToggle(id);
    if (action === 'del')    btn.onclick = () => accionDel(id);
    if (action === 'edit')   btn.onclick = () => accionEdit(id);
  });
}

function renderTarjeta(r) {
  const cat     = getCat(r.tipo);
  const esAdmin = S.usuario.rol === 'administrador';

  const checkBtn = esAdmin
    ? `<button class="check-btn" data-id="${r.id}" data-action="toggle" style="color:${r.completado?'#0d7a3d':'#94a3b8'}">${r.completado?'✅':'⭕'}</button>`
    : `<span class="estado-badge" style="background:${r.completado?'#e8f5ee':'#fef3e8'};color:${r.completado?'#0d7a3d':'#b54708'}">${r.completado?'Completado':'Pendiente'}</span>`;

  const adminBtns = esAdmin ? `
    <button class="del-btn" data-id="${r.id}" data-action="edit" title="Editar">✏️</button>
    <button class="del-btn" data-id="${r.id}" data-action="del" title="Eliminar">✕</button>` : '';

  const extras = S.campos.map(c =>
    r.extras?.[c.id] ? `<div class="dato"><span style="font-size:14px;color:#94a3b8">🏷️</span><div><div class="dato-label">${esc(c.label)}</div><div class="dato-valor">${esc(r.extras[c.id])}</div></div></div>` : ''
  ).join('');

  const detalle = r.contexto ? `<div class="detalle-box"><div class="detalle-label">Detalle</div><div class="detalle-texto">${esc(r.contexto)}</div></div>` : '';

  return `
  <article class="tarjeta ${r.completado?'completada':''}" style="border-left-color:${cat.color}">
    <div class="tarjeta-header">
      <div class="icono-tipo" style="background:${cat.bg};color:${cat.color}">${cat.icon}</div>
      <div class="tarjeta-info">
        <div class="tarjeta-cliente">${esc(r.nombre)}</div>
        <div class="tarjeta-tipo" style="color:${cat.color}">${esc(cat.label)}</div>
      </div>
      <div class="tarjeta-actions no-print">${checkBtn}${adminBtns}</div>
    </div>
    <div class="tarjeta-body">
      <div class="datos-grid">
        <div class="dato"><span style="font-size:14px;color:#94a3b8">#️</span><div><div class="dato-label">DNI / RUC</div><div class="dato-valor">${esc(r.documento)}</div></div></div>
        <div class="dato"><span style="font-size:14px;color:#94a3b8">📞</span><div><div class="dato-label">Teléfono</div><div class="dato-valor">${esc(r.telefono)}</div></div></div>
        ${r.telefono2 ? `<div class="dato"><span style="font-size:14px;color:#94a3b8">📞</span><div><div class="dato-label">Teléfono alt.</div><div class="dato-valor">${esc(r.telefono2)}</div></div></div>` : ''}
        <div class="dato"><span style="font-size:14px;color:#94a3b8">👤</span><div><div class="dato-label">Atendido por</div><div class="dato-valor">${esc(r.creado_por)}</div></div></div>
        ${extras}
      </div>
      ${detalle}
    </div>
  </article>`;
}

async function accionToggle(id) {
  await api('toggle_completado', { id }, 'POST');
  await cargarRegistros(); render();
}

async function accionDel(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  await api('delete_registro', { id }, 'POST');
  toast('Registro eliminado');
  await cargarRegistros(); render();
}

function accionEdit(id) {
  const r = S.registros.find(r => String(r.id) === String(id));
  if (!r) return;
  S.modal = { tipo:'registro', datos:r };
  S.editando = r;
  render();
  setTimeout(() => $('f-nombre')?.focus(), 50);
}

// CATEGORÍAS
function renderCategorias() {
  const cats = S.categorias.map(cat => `
  <div class="cat-card" style="border-left-color:${cat.color}">
    <div class="icono-tipo" style="background:${cat.bg};color:${cat.color};font-size:22px">${cat.icon}</div>
    <div style="flex:1"><div class="cat-label">${esc(cat.label)}</div></div>
    <div style="display:flex;gap:4px">
      <button class="del-btn" data-id="${cat.id}" data-action="edit-cat">✏️</button>
      <button class="del-btn" data-id="${cat.id}" data-action="del-cat">🗑️</button>
    </div>
  </div>`).join('');

  return `
  <div class="section-header">
    <div><h2 class="section-title">Categorías de servicio</h2><p class="section-sub">Tipos de servicio disponibles.</p></div>
    <button class="btn-primary" id="btn-nueva-cat">+ Nueva categoría</button>
  </div>
  <div class="cat-grid">${cats}</div>`;
}

function bindCategorias() {
  $('btn-nueva-cat')?.addEventListener('click', () => { S.modal={tipo:'categoria',datos:null}; render(); setTimeout(()=>$('cat-label')?.focus(),50); });
  document.querySelectorAll('[data-action="edit-cat"]').forEach(b =>
    b.addEventListener('click', () => { S.modal={tipo:'categoria',datos:S.categorias.find(c=>c.id===b.dataset.id)}; render(); setTimeout(()=>$('cat-label')?.focus(),50); })
  );
  document.querySelectorAll('[data-action="del-cat"]').forEach(b =>
    b.addEventListener('click', async () => {
      if (!confirm('¿Eliminar esta categoría?')) return;
      await api('delete_categoria', { id: b.dataset.id }, 'POST');
      toast('Categoría eliminada');
      S.categorias = await api('get_categorias'); render();
    })
  );
}

// CAMPOS EXTRA
function renderCampos() {
  const campos = S.campos.map((c,i) => `
  <div class="campo-card">
    <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(c.label)}</div><div style="font-size:12px;color:#94a3b8;margin-top:2px">${c.tipo} · ${esc(c.placeholder||'-')}</div></div>
    <button class="del-btn" data-id="${c.id}" data-action="del-campo">✕</button>
  </div>`).join('');

  return `
  <div class="section-header">
    <div><h2 class="section-title">Campos adicionales</h2><p class="section-sub">Campos extra en el formulario de registro.</p></div>
    <button class="btn-primary" id="btn-nuevo-campo">+ Nuevo campo</button>
  </div>
  <div class="campo-lista">${campos || '<p style="color:#64748b;font-size:14px">No hay campos extra.</p>'}</div>`;
}

function bindCampos() {
  $('btn-nuevo-campo')?.addEventListener('click', () => { S.modal={tipo:'campo',datos:null}; render(); setTimeout(()=>$('campo-label')?.focus(),50); });
  document.querySelectorAll('[data-action="del-campo"]').forEach(b =>
    b.addEventListener('click', async () => {
      if (!confirm('¿Eliminar este campo?')) return;
      await api('delete_campo', { id: b.dataset.id }, 'POST');
      toast('Campo eliminado');
      S.campos = await api('get_campos'); render();
    })
  );
}

// MODAL
function renderModal() {
  const m = state = S.modal;
  let body = '';
  if (m.tipo === 'registro')  body = renderModalRegistro(m.datos);
  if (m.tipo === 'categoria') body = renderModalCategoria(m.datos);
  if (m.tipo === 'campo')     body = renderModalCampo();
  return `<div class="modal-overlay" id="modal-overlay">${body}</div>`;
}

function renderModalRegistro(d) {
  const fecha = d?.fecha || S.fecha || new Date().toISOString().split('T')[0];
  const tipoActual = d?.tipo || S.categorias[0]?.id || '';

  const tipos = S.categorias.map(t => {
    const activo = tipoActual === t.id;
    return `<button class="tipo-opcion ${activo?'activo':''}" data-tipo="${t.id}"
      style="--cat-color:${t.color};--cat-bg:${t.bg};${activo?`border-color:${t.color};background:${t.bg};color:${t.color}`:''}"
    ><span style="font-size:18px">${t.icon}</span><span>${esc(t.label)}</span></button>`;
  }).join('');

  const extras = S.campos.length ? `
  <div class="extras-box">
    <div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em">Campos adicionales</div>
    ${S.campos.map(c=>`<div class="field"><label>${esc(c.label)}</label><input class="input" id="extra-${c.id}" type="${c.tipo||'text'}" value="${esc(d?.extras?.[c.id]||'')}" placeholder="${esc(c.placeholder||'')}" /></div>`).join('')}
  </div>` : '';

  return `
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h2 class="modal-title">${d?.id?'Editar registro':'Nuevo registro'}</h2><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre y apellido *</label><input id="f-nombre" class="input" value="${esc(d?.nombre||'')}" placeholder="Ej. Juan Pérez García" /></div>
      <div class="row-2">
        <div class="field"><label>Fecha *</label><input id="f-fecha" class="input" type="date" value="${fecha}" /></div>
        <div class="field"><label>DNI o RUC *</label><input id="f-doc" class="input" value="${esc(d?.documento||'')}" placeholder="12345678" /></div>
      </div>
      <div class="field"><label>Teléfono *</label><input id="f-tel" class="input" type="tel" value="${esc(d?.telefono||'')}" placeholder="999 888 777" /></div>
      <div id="tel2-wrap">${d?.telefono2
        ? `<div class="field"><label>Teléfono alt.</label><input id="f-tel2" class="input" type="tel" value="${esc(d.telefono2)}" /></div>`
        : `<button style="border:none;background:transparent;color:#1d4ed8;font-size:13px;font-weight:500;cursor:pointer" id="btn-add-tel2">+ Agregar otro número</button>`}
      </div>
      <div class="field"><label>Tipo de servicio *</label><div class="tipo-grid" id="tipo-grid">${tipos}</div></div>
      ${extras}
      <div class="field"><label>Detalle del trabajo</label><textarea id="f-contexto" class="input" style="min-height:90px;resize:vertical" placeholder="Describí lo que se hará...">${esc(d?.contexto||'')}</textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">${d?.id?'Actualizar':'Guardar registro'}</button>
    </div>
  </div>`;
}

function renderModalCategoria(d) {
  const col = d?.color || COLORES[0].color;
  const bg  = d?.bg    || COLORES[0].bg;
  const ico = d?.icon  || '🔧';

  const colores = COLORES.map(c=>`<button class="color-btn ${c.color===col?'active':''}" data-color="${c.color}" data-bg="${c.bg}" style="background:${c.color};${c.color===col?`box-shadow:0 0 0 3px ${c.color}55`:''}" title="${c.name}"></button>`).join('');
  const emojis  = EMOJIS.map(e=>`<button class="emoji-btn ${e===ico?'active':''}" data-emoji="${e}">${e}</button>`).join('');

  return `
  <div class="modal" onclick="event.stopPropagation()" style="max-width:460px">
    <div class="modal-header"><h2 class="modal-title">${d?.id?'Editar categoría':'Nueva categoría'}</h2><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div id="cat-preview" class="cat-card" style="border-left-color:${col}">
        <div id="cat-prev-ico" class="icono-tipo" style="background:${bg};color:${col};font-size:22px">${ico}</div>
        <div><div id="cat-prev-label" class="cat-label">${esc(d?.label||'Vista previa')}</div></div>
      </div>
      <div class="field"><label>Nombre *</label><input id="cat-label" class="input" value="${esc(d?.label||'')}" placeholder="Ej. Cambio de equipo" /></div>
      <div class="field"><label>Color</label><div class="color-row">${colores}</div></div>
      <div class="field"><label>Ícono</label><div class="emoji-grid">${emojis}</div></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">Guardar</button>
    </div>
  </div>`;
}

function renderModalCampo() {
  return `
  <div class="modal" onclick="event.stopPropagation()" style="max-width:420px">
    <div class="modal-header"><h2 class="modal-title">Nuevo campo extra</h2><button class="icon-btn" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre *</label><input id="campo-label" class="input" placeholder="Ej. Número de serie" /></div>
      <div class="field"><label>Tipo</label><select id="campo-tipo" class="input"><option value="text">Texto</option><option value="number">Número</option><option value="date">Fecha</option></select></div>
      <div class="field"><label>Placeholder</label><input id="campo-ph" class="input" placeholder="Texto de ayuda..." /></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn-primary" id="modal-save">Agregar campo</button>
    </div>
  </div>`;
}

function bindModal() {
  $('modal-overlay')?.addEventListener('click', () => { S.modal=null; render(); });
  $('modal-close')?.addEventListener('click',   () => { S.modal=null; render(); });
  $('modal-cancel')?.addEventListener('click',  () => { S.modal=null; render(); });

  const m = S.modal;

  if (m.tipo === 'registro') {
    $('btn-add-tel2')?.addEventListener('click', () => {
      $('tel2-wrap').innerHTML = `<div class="field"><label>Teléfono alt.</label><input id="f-tel2" class="input" type="tel" placeholder="999 888 777" /></div>`;
    });
    document.querySelectorAll('#tipo-grid .tipo-opcion').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#tipo-grid .tipo-opcion').forEach(b => {
          const c = S.categorias.find(c=>c.id===b.dataset.tipo);
          b.style.borderColor = ''; b.style.background = ''; b.style.color = '';
          b.classList.remove('activo');
        });
        const c = S.categorias.find(c=>c.id===btn.dataset.tipo);
        btn.style.borderColor = c.color;
        btn.style.background  = c.bg;
        btn.style.color       = c.color;
        btn.classList.add('activo');
      });
    });
    $('modal-save')?.addEventListener('click', guardarRegistro);
  }

  if (m.tipo === 'categoria') {
    $('cat-label')?.addEventListener('input', e => { $('cat-prev-label').textContent = e.target.value || 'Vista previa'; });
    document.querySelectorAll('.color-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(x => { x.classList.remove('active'); x.style.boxShadow=''; });
        b.classList.add('active'); b.style.boxShadow = `0 0 0 3px ${b.dataset.color}55`;
        $('cat-prev-ico').style.background = b.dataset.bg;
        $('cat-prev-ico').style.color      = b.dataset.color;
        $('cat-preview').style.borderLeftColor = b.dataset.color;
      });
    });
    document.querySelectorAll('.emoji-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.emoji-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        $('cat-prev-ico').textContent = b.dataset.emoji;
      });
    });
    $('modal-save')?.addEventListener('click', guardarCategoria);
  }

  if (m.tipo === 'campo') {
    $('modal-save')?.addEventListener('click', guardarCampo);
  }
}

async function guardarRegistro() {
  const nombre    = $('f-nombre')?.value.trim();
  const fecha     = $('f-fecha')?.value;
  const documento = $('f-doc')?.value.trim();
  const telefono  = $('f-tel')?.value.trim();
  if (!nombre || !fecha || !documento || !telefono) { toast('Completá los campos obligatorios (*)', true); return; }

  const tipoActivo = document.querySelector('#tipo-grid .tipo-opcion.activo') || document.querySelector('#tipo-grid .tipo-opcion');
  const tipo = tipoActivo?.dataset.tipo || S.categorias[0]?.id || 'otro';

  const extras = {};
  S.campos.forEach(c => { const el = $(`extra-${c.id}`); if (el) extras[c.id] = el.value; });

  const payload = {
    nombre, fecha, documento, telefono,
    telefono2: $('f-tel2')?.value.trim() || '',
    tipo, contexto: $('f-contexto')?.value.trim() || '', extras,
  };
  if (S.editando?.id) payload.id = S.editando.id;

  await api('save_registro', payload, 'POST');
  toast(S.editando?.id ? 'Registro actualizado' : 'Registro guardado');
  S.modal = null; S.editando = null;
  await cargarRegistros(); render();
}

async function guardarCategoria() {
  const label = $('cat-label')?.value.trim();
  if (!label) { toast('Ingresá un nombre', true); return; }
  const colorActivo = document.querySelector('.color-btn.active');
  const emojiActivo = document.querySelector('.emoji-btn.active');
  const payload = {
    label,
    color: colorActivo?.dataset.color || COLORES[0].color,
    bg:    colorActivo?.dataset.bg    || COLORES[0].bg,
    icon:  emojiActivo?.dataset.emoji || '🔧',
  };
  if (S.modal.datos?.id) payload.id = S.modal.datos.id;
  await api('save_categoria', payload, 'POST');
  toast('Categoría guardada');
  S.categorias = await api('get_categorias');
  S.modal = null; render();
}

async function guardarCampo() {
  const label = $('campo-label')?.value.trim();
  if (!label) { toast('Ingresá un nombre', true); return; }
  await api('save_campo', {
    label,
    tipo: $('campo-tipo')?.value || 'text',
    placeholder: $('campo-ph')?.value.trim() || '',
  }, 'POST');
  toast('Campo agregado');
  S.campos = await api('get_campos');
  S.modal = null; render();
}

// ─── START ─────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
